front:
  text: 正一指教齋清旦行道儀
  hash: sha256:7af6d99cc83191d3cb6e5b47eb85d6f4dbf9370d0d35122976e181786453340c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0196_HFL_000-001a, image: hfl/0565/0565-048.png}
body:
  text: 先發鑪太上玄元五靈老君當召功曹使者左右龍虎君捧香使者三炁正神急上關啓三天太上玄元大道君臣等正爾燒香清旦齋事願得八方正炁來入臣等身中所啓速逹徑御至眞無極道前次上香周迴還東向再拜次長跪叩齒二十四通出官謹出臣等身中五體眞官功曹吏出臣等身中治職君吏建節監功大將軍前部效功後部效殺驛亭令驛亭丞四部監功謁者及臣等所佩仙靈二官直使正一功曹治病功曹左右官使者隂陽神決吏科車赤符吏剛風騎置驛馬上章吏官各二人出出者嚴裝顯服冠帶垂纓整其威儀住立臣等前後左右咸受臣口中辭語分别關啓泰清官屬監齋君吏天師所布下二十四治諸官君將吏道上二玄三元四始甲子諸官君七十二官三官考召直日直符五嶽四瀆丘沼廟神山林孟長山川溪谷及此間州縣鄕里里域眞官注炁監察考召土地之主社里邑君一時嚴裝與臣等身中功曹使者及飛龍驛吏上啓太上大道太上老君太上丈人四方衆真道德尊君天師嗣師系師女師三師君門下典者君吏泰清靈神正一諸官君臣等謬參法教職在披述爰值歸吿輒爲宣騰謹有云云次讀辭辭言懇倒謹具陳請爲依漢中舊典建指教齋直一日一夜三時行道日夜祗誠特賜玄澤俯垂臨照請三天監齋仙官天兵騎乘各依儀法一合來下行神布炁輔衞道場澄潔身心祈願感逹降福消禍乞如所陳功曹使者分别聞奏以時上逹列啓事竟各還臣等身中復於宮室須召又到一如故事因伏地三叩三咽起再拜次便四方朝若中亥即於此先發鑪然後行四方朝太上玄元五靈老君當召功曹使者左右龍虎君捧香使者三炁正神急上關啓三天太上玄元大道君臣等正爾燒香清旦齋事願得八方正炁來入臣等身中所啓速逹徑御至眞無極道前次法師還東面西向長跪上香周竟還次西向各稱治職再拜平坐讀謹關啓天師嗣師系師女師三師君夫人門下無者君吏次北向謹關啓上皇太上北上大道君次東向謹關啓太清玄元上三天無極大道太上老君太上文人天帝君天帝丈人九老仙都君九炁大人等百千萬重道炁千二百官君太清玉陛下次南向謹關啓南上大道君司命衆官三天萬福君臣等宿丗因果禀承正教運逢僥倖叨擢冥津業愧清虚行慚忍辱恒願立功補過延福拔咎消遣累欲增長勝緣拯接憂危祈濟苦難今謹有齋忱用伸宣讀讀辭具如翰墨所陳宜可騰奏輒相攜率爲施主某乙建立天師指教齋直一日一夜三時行道願以是功德爲齋主家七世父母先過後亡一切神爽消釋殃對和解基罰拔長夜魂贖永劫罪斷地獄緣結天堂業故歸身大道歸神大道歸命大道第一上香願以是功德上延七世父母遏去神識當令免離災戹苦難咸得解脫煩惱惡根受鍊朱陵輪化南極永出三塗長逺五道不更六趣不渉八門澤被後徒福流見在今故燒香自歸依師君昇入無形和與道合眞第二上香願以是功德奉爲帝主國三君臣吏民保鎭皇基興隆社稷安邦利壤延福享祚故歸身大道歸神大道歸命大道持是功德上延帝主國王君臣吏民當令免離災戹苦難咸得解脫煩惱惡根使壽永乾坤年逾椿嶽國治民安功成道泰上慈下孝君禮臣忠六合寜靜九有清平今故燒香自歸依師君昇入無形和與道合眞第三上香願以是功德爲供主自身及家門眷屬尊卑善慶救災度戹保命廷年滅禍消凶除殃却患祈恩請福拔罪解愆并及同炁左右衆官治所領民天下吏民等普同福慶徧受洪潤故歸身大道歸神大道歸命大道持是功德歸某等身及家門眷屬尊卑大小同炁左右衆官治所領民天下吏民當令免離災戹苦難咸得解脫煩惱惡根五刑六害一切消弭千殃萬患並皆迴伏四關九竅吐故納新三一五神鎭衞宫府心開意朗耳目聴明所向所欲必獲從果所營所作萬事諧克求道降眞求財得寳南昌領籍司命記名長存久視德合天地畜牧之屬蝖飛蠢動巳生未生咸蒙成就令故燒香自歸依師君昇入無形和與道合眞再拜次誦詠三首淨意結五内攝情修齋直先人獲其慶子孫得其福身固殊金剛壽命無终極心知瑠璃珠光明照身外是謂無上道衆道中之最皆從齋直生捻香之所得是爲大道座賢者各努力捻香上虚無精誠感一切一心無二意願念隨煙昇香煙昇太清願念尋煙至煙御大道前太上稱爲快旋行各三周功德因旋邁三官除罪契左神著生録仙都定玉曆記名著左契天老刻玉籙冥德於金匱齋戒攝情念燒香向空無旋行奏至誠從道求所如願除億㑹罪赦貫代兆軀基考一切解福德當歸流明内受吉慶後世悉皆如是皆燒香得知此由天師不勝情喜躍禮拜天師君正一指教齋清旦行道儀
